<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
/* ===== design tokens ===== */
:root{
 --gap-section:24px; --gap-card:16px; --pad-card:16px; --radius:16px; --radius-sm:12px;
 --ink:#1c1c1c; --ink-2:#3e3b35; --muted:#555551; --faint:#706960;
 --line:#e6e2d8; --bg:#f0f0f0; --card:#fff;
 --red:#e63012; --green:#2faa72; --gold:#b07700; --blue:#2d5bff;
 /* type scale */
 --fs-eyebrow:10px; --fs-cap:12px; --fs-body:14px; --fs-h3:16px; --fs-num:22px; --fs-hero:40px;
}
body{background:var(--bg);font-family:'Google Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--ink);min-height:100vh;overflow-x:hidden;position:relative;-webkit-font-smoothing:antialiased}
.app{max-width:960px;margin:0 auto;padding:20px 16px 80px;overflow-x:hidden}
/* ===== motion layer · purpose-driven (reward / rhythm / attention) · gated ===== */
.reveal{opacity:0;transform:translateY(12px);will-change:opacity,transform}
.reveal.in{opacity:1;transform:none;transition:opacity .5s ease,transform .55s cubic-bezier(.22,1,.36,1)}
@media(prefers-reduced-motion:reduce){.reveal,.reveal.in{opacity:1!important;transform:none!important;transition:none!important}}
/* Tier 3 — hover lift การ์ด stat/prog (decorative) */
.stat,.prog{transition:transform .18s ease,box-shadow .18s ease}
.stat:hover,.prog:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.06)}
/* Tier 3 — shimmer บน progress bar (สว่างวิ่งผ่านบางๆ) */
.progress-fill{position:relative;overflow:hidden}
.progress-fill::after{content:"";position:absolute;inset:0;background:linear-gradient(100deg,transparent 35%,rgba(255,255,255,.4) 50%,transparent 65%);transform:translateX(-120%);animation:pf-shim 3s ease-in-out 1.2s infinite}
@keyframes pf-shim{0%{transform:translateX(-120%)}55%,100%{transform:translateX(220%)}}
@media(prefers-reduced-motion:reduce){.stat:hover,.prog:hover{transform:none!important}.progress-fill::after{display:none!important}}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:18px 0 14px;border-bottom:1px solid #e3e0d7;gap:12px;flex-wrap:wrap}
.logo{font-size:13px;font-weight:700;letter-spacing:.12em;text-transform:uppercase}
.logo span{color:#e63012}
.btn{font-family:inherit;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:7px 14px;border-radius:3px;border:1px solid;cursor:pointer;transition:all .15s;background:none}
.btn-outline{border-color:#cfccc2;color:#6b6b6b}.btn-outline:hover{border-color:#9a968a;color:#1c1c1c}
.btn-gold{border-color:#d6920a;color:#b07700}.btn-gold:hover{background:#f5a62318}
.banner{background:#fdf6e3;border:1px solid #f0d89a;border-radius:3px;padding:10px 14px;margin-top:14px;font-size:11px;color:#9a6b00;line-height:1.5}
.race-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:14px}
.race{background:#fff;border:1px solid #e3e0d7;border-radius:3px;padding:10px 12px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.race.next{border-color:#e63012}
.race-label{font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.race-name{font-size:13px;font-weight:600;color:#1c1c1c;line-height:1.3}
.race-meta{font-size:10px;color:#6b6b6b;margin-top:2px}
.prog-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:14px}
.prog{background:#fff;border:1px solid #e3e0d7;border-radius:3px;padding:10px 12px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.prog.ef{border-color:#bfdcf3}
.prog-l{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.prog-v{font-size:20px;font-weight:700;line-height:1}
.prog-v .arw{font-size:11px;margin-left:4px}
.prog-u{font-size:10px;color:var(--muted);margin-top:3px;line-height:1.4}
.day-log{display:flex;align-items:center;gap:10px;margin-top:8px;flex-wrap:wrap;padding-top:8px;border-top:1px dashed #ddd9cf;font-size:11px;color:#444;font-weight:600}
.day-log .la{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.day-log .tm{color:var(--muted);font-weight:500}
.day-log .ef{margin-left:auto;font-size:10px;font-weight:700;color:#3a86c8;background:#e8f2fb;border:1px solid #bfdcf3;border-radius:2px;padding:3px 7px}
.sched-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--line);border-radius:12px;padding:4px 8px;box-shadow:0 1px 2px rgba(0,0,0,.03);margin-top:2px;
 /* scroll-shadow: เงาขอบขวาโผล่เฉพาะตอนยังเลื่อนได้ (cover=local, shadow=scroll) */
 background:
  linear-gradient(to right,#fff 28%,rgba(255,255,255,0)) left center/36px 100% no-repeat,
  linear-gradient(to left,#fff 28%,rgba(255,255,255,0)) right center/36px 100% no-repeat,
  radial-gradient(farthest-side at 0 50%,rgba(28,28,28,.10),transparent) left center/16px 100% no-repeat,
  radial-gradient(farthest-side at 100% 50%,rgba(28,28,28,.10),transparent) right center/16px 100% no-repeat;
 background-color:#fff;background-attachment:local,local,scroll,scroll}
.sched{width:100%;min-width:540px;border-collapse:collapse;font-size:12px;background:transparent}
.sched th{text-align:left;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:7px 8px;border-bottom:1px solid #e3e0d7;white-space:nowrap;background:#faf9f5}
.sched td{padding:10px 8px;border-bottom:1px solid #eceae2;vertical-align:top}
.sched tbody tr:not(.today):not(.done):not(.rest):hover{background:#faf9f4}
.sched tr:last-child td{border-bottom:none}
.sched tr.today{background:#fdece9}
.sched tr.done{background:#f4faf6}
.sched tr.rest td{color:#706960}
.s-day{white-space:nowrap;font-weight:700;border-left:3px solid #ccc;padding-left:8px!important}
.s-dt{display:block;font-size:10px;font-weight:400;color:var(--muted);margin-top:1px}
.s-today-tag{font-size:7px;background:#e63012;color:#fff;padding:1px 4px;border-radius:2px;margin-left:4px;letter-spacing:.06em;vertical-align:middle}
.s-chip{display:inline-block;font-size:8px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:1px 6px;border-radius:2px;margin-bottom:4px}
.s-ti{font-weight:600;color:#1c1c1c;line-height:1.3}
.s-de{font-size:10px;color:var(--muted);line-height:1.45;margin-top:2px}
.s-alt{font-size:10px;color:#9a6b00;margin-top:2px}
.s-plan{white-space:nowrap;color:#555;font-weight:600;font-variant-numeric:tabular-nums}
.s-res{color:#444;font-weight:600;white-space:nowrap;font-variant-numeric:tabular-nums}
.s-res .tm{color:var(--muted)}
.s-ef{display:inline-block;font-size:10px;font-weight:700;color:#3a86c8;background:#e8f2fb;border:1px solid #bfdcf3;border-radius:2px;padding:1px 5px;margin-left:5px}
.s-none{color:#8a8578}
.dist-chart{position:relative;display:flex;align-items:stretch;gap:6px;height:120px;padding:10px 6px 6px;border:1px solid #e3e0d7;border-radius:4px;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.03);overflow:visible}
.dc-track{position:relative}
.dc-ghost{position:absolute;left:0;right:0;bottom:0;background:repeating-linear-gradient(45deg,#e8e5dd,#e8e5dd 4px,#f1efe9 4px,#f1efe9 8px);border-radius:3px 3px 0 0;min-height:2px}
.dc-bar{position:relative}
.chart-legend{display:flex;gap:16px;justify-content:center;font-size:10px;font-weight:600;color:var(--muted);margin-top:8px;margin-bottom:8px}
.chart-legend span{display:inline-flex;align-items:center;gap:5px}
.chart-legend i{display:inline-block;width:12px;height:12px;border-radius:3px;font-style:normal}
.lg-ghost{background:repeating-linear-gradient(45deg,#e8e5dd,#e8e5dd 3px,#f1efe9 3px,#f1efe9 6px)}
.lg-actual{background:#52c896}
.dc-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.dc-km{font-size:10px;font-weight:700;color:#555;min-height:11px}
.dc-track{flex:1;width:100%;display:flex;align-items:flex-end;justify-content:center}
.dc-bar{width:100%;max-width:30px;border-radius:3px 3px 0 0;min-height:2px;transition:height .3s}
.dc-d{font-size:10px;color:var(--muted)}
.week-nav{display:flex;align-items:center;gap:0;overflow-x:auto;padding:16px 0 0;border-bottom:1px solid #e3e0d7;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.week-nav::-webkit-scrollbar{display:none}
.wk-btn{font-family:inherit;font-size:10px;font-weight:600;padding:8px 10px;background:none;border:none;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:all .12s;letter-spacing:.06em}
.wk-btn:hover{color:#1c1c1c}
.wk-btn.active{color:#1c1c1c;border-bottom-color:#e63012}
.wk-btn.current{color:#b07700}
.wk-btn{position:relative}
.wk-dot{position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:#2faa72}
.wk-btn.active .wk-dot{background:#fff}
.week-hero{padding:20px 0 18px;border-bottom:1px solid var(--line)}
.week-hero-row{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.week-hero-l{flex:1;min-width:240px}
.week-eyebrow{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.week-eyebrow .we-w{color:var(--red);font-size:13px}
.week-focus{font-size:19px;font-weight:700;line-height:1.3;color:var(--ink)}
.week-dates{font-size:12px;color:var(--muted);margin-top:5px;font-weight:400}
/* monthly mileage prog tile (in top stats grid) */
.prog-month-row{display:flex;align-items:center;gap:10px;margin-top:6px}
.prog-month-ring{position:relative;width:42px;height:42px;flex-shrink:0}
.prog-month-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums}
.prog-month-r{flex:1;min-width:0}
/* (legacy) monthly mileage tile — เก็บ CSS ไว้เผื่อใช้ที่อื่น */
.month-tile{display:flex;align-items:center;gap:14px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px 16px;min-width:230px}
.month-ring{position:relative;width:54px;height:54px;flex-shrink:0}
.month-ring svg{transform:rotate(-90deg)}
.month-ring-bg{stroke:#f1efe9;fill:none;stroke-width:6}
.month-ring-fill{fill:none;stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset .8s cubic-bezier(.22,1,.36,1)}
.month-ring-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums}
.month-r{flex:1;min-width:0}
.month-l{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.month-v{font-size:16px;font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums;line-height:1.1}
.month-v span{font-size:11px;color:var(--muted);font-weight:600}
.month-u{font-size:10px;color:var(--muted);margin-top:2px}
.month-u b{font-weight:700}
/* weights routine list */
.weights-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-top:8px}
.weights-grp{margin-top:14px}
.weights-grp:first-child{margin-top:0}
.weights-grp-l{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-2);margin-bottom:8px;display:flex;align-items:center;gap:10px}
.weights-grp-l::after{content:'';flex:1;height:1px;background:var(--line)}
.weights-row{display:flex;justify-content:space-between;font-size:12px;padding:5px 0;color:var(--ink-2)}
.weights-row b{font-weight:600;color:var(--ink)}
.weights-row span{color:var(--muted);font-weight:500;font-variant-numeric:tabular-nums}
.weights-note{font-size:11px;color:var(--muted);margin-top:14px;padding-top:10px;border-top:1px dashed var(--line);line-height:1.55}
.phase-banner{display:flex;gap:3px;margin:16px 0}
.ph-seg{flex:1;height:5px;border-radius:2px}
.week-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin:16px 0 24px}
.stat{background:#fff;border:1px solid #e3e0d7;border-radius:3px;padding:12px 14px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.stat-l{font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.stat-v{font-size:22px;font-weight:700;line-height:1}
.stat-u{font-size:10px;color:var(--muted);margin-top:2px}
.load-bar{display:flex;align-items:center;gap:8px}
.load-bar .track{flex:1;height:6px;background:#ece9e1;border-radius:3px;overflow:hidden}
.load-bar .fill{height:100%;border-radius:3px;transition:width .4s}
.load-bar .num{font-size:11px;font-weight:700;width:28px;text-align:right}
.progress{background:#fff;border:1px solid #e3e0d7;border-radius:3px;padding:12px 16px;margin-top:8px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.progress-top{display:flex;justify-content:space-between;margin-bottom:6px}
.progress-l{font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
.progress-v{font-size:11px;font-weight:700}
.progress-track{height:8px;background:#ece9e1;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:width .4s}
.section-l{font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-2);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--line);margin-top:24px}
.days{display:grid;grid-template-columns:1fr;gap:10px}
.day{background:#fff;border:1px solid #e7e4db;border-radius:4px;padding:14px 16px;position:relative;transition:.2s;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.day.today{background:#fdece9;border-color:#e63012}
.day.rest{background:#f1efe9;border-color:#e7e4db;opacity:.75;box-shadow:none}
.day.done{background:#eef8f2;border-color:#52c896}
.day.done.q{background:#e3f4ea}
.day-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.day-date{font-size:10px;font-weight:700;padding:2px 6px;border-radius:2px;letter-spacing:.08em;border:1px solid}
.day-type{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase}
.today-tag{margin-left:auto;background:#e63012;color:#fff;font-size:8px;font-weight:700;letter-spacing:.1em;padding:2px 6px;border-radius:2px}
.day-title{font-size:14px;font-weight:600;color:#1c1c1c;line-height:1.3;margin-bottom:4px}
.day.done .day-title{text-decoration:line-through;text-decoration-color:#52c89680;color:#2faa72}
.day-desc{font-size:12px;color:#6b6b6b;line-height:1.6;margin-bottom:8px}
.day-alt{font-size:11px;color:#9a6b00;background:#fdf6e3;border:1px solid #f0d89a;border-radius:2px;padding:5px 8px;line-height:1.5;margin-bottom:8px}
.day-meta{display:flex;gap:10px;font-size:11px;color:#6b6b6b;flex-wrap:wrap}
.day-meta .carb{color:#b07700;margin-left:auto}
.pace-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px}
.pace{background:#fff;border:1px solid #e7e4db;border-radius:3px;padding:7px 12px;display:flex;gap:8px;align-items:center}
.pace .bar{width:3px;height:24px;border-radius:2px}
.pace-l{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.pace-v{font-size:13px;font-weight:700}
.legend-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px;margin-top:8px}
.legend{background:#fff;border:1px solid #e7e4db;border-radius:3px;padding:8px 10px}
.legend-l{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px}
.legend-v{font-size:13px;font-weight:700;color:#b07700}
.legend-u{font-size:10px;color:var(--muted);margin-top:1px}
/* ===== v2 redesign — radius 16, hero, race timeline, chips, HR chart ===== */
.prog,.stat,.progress,.dist-chart{border-radius:16px}
.prog{padding:16px}
.prog-bar{gap:16px;margin-top:24px}
.pace,.legend{border-radius:12px}
/* hero — dark race-poster style · checkered subtle texture */
.hero{position:relative;overflow:hidden;background:radial-gradient(ellipse at 28% 22%,#72d4ff 0%,#29aaef 42%,#1480d4 100%);border-radius:20px;padding:16px;margin-top:16px;color:#fff;box-shadow:0 8px 28px rgba(0,0,0,.18)}
.hero::before{content:'';position:absolute;inset:0;background-image:linear-gradient(45deg,#0e6bbf 25%,transparent 25%,transparent 75%,#0e6bbf 75%),linear-gradient(45deg,#0e6bbf 25%,transparent 25%,transparent 75%,#0e6bbf 75%);background-size:28px 28px;background-position:0 0,14px 14px;opacity:.22;pointer-events:none;mask-image:linear-gradient(135deg,#000 0%,#000 35%,transparent 65%);-webkit-mask-image:linear-gradient(135deg,#000 0%,#000 35%,transparent 65%)}
.hero-inner{position:relative;display:flex;align-items:center;column-gap:20px;row-gap:14px;flex-wrap:wrap}
.hero-left{flex:1;min-width:200px}
.hero-right{display:flex;align-items:center;gap:12px;flex-wrap:nowrap}
.hero-eyebrow{display:flex;align-items:center;gap:7px;font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.72);margin-bottom:10px}
.pulse-dot{width:7px;height:7px;border-radius:50%;background:#d4f54a;box-shadow:0 0 0 0 rgba(212,245,74,.5);animation:pulse 1.8s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(212,245,74,.55)}70%{box-shadow:0 0 0 9px rgba(212,245,74,0)}100%{box-shadow:0 0 0 0 rgba(212,245,74,0)}}
.hero-race{font-size:24px;font-weight:800;line-height:1.15;color:#fff;letter-spacing:-.01em}
.hero-meta{font-size:12px;color:rgba(255,255,255,.72);margin-top:6px;line-height:1.5}
.hero-meta b{color:rgba(255,255,255,.95);font-weight:600}
.hero-countdown{display:flex;align-items:flex-start;gap:10px;font-variant-numeric:tabular-nums}
.cd-block{display:flex;flex-direction:column;align-items:center;min-width:40px}
.cd-num{font-size:32px;font-weight:800;line-height:1;letter-spacing:-.02em;color:#fff}
.cd-unit{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.65);margin-top:6px;font-weight:600}
.cd-sep{font-size:22px;color:#3a3a3a;font-weight:300;line-height:1;padding-top:3px}
.hero-goal{background:#d4f54a;color:#1a1a1a;padding:9px 14px;border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap;letter-spacing:.01em;box-shadow:0 2px 10px rgba(212,245,74,.25)}
.hero-prog-row{position:relative;display:flex;align-items:center;gap:12px;margin-top:20px;padding-top:18px;border-top:1px solid rgba(255,255,255,.18)}
.hero-prog-l{font-size:11px;color:rgba(255,255,255,.72);font-weight:600;white-space:nowrap}
.hero-prog-track{flex:1;height:6px;background:rgba(255,255,255,.18);border-radius:8px;overflow:hidden}
.hero-prog-fill{height:100%;background:linear-gradient(90deg,#d4f54a,#9bd027);border-radius:8px;transition:width 1s cubic-bezier(.22,1,.36,1)}
.hero-prog-v{font-size:11px;color:#d4f54a;font-weight:700;min-width:36px;text-align:right;font-variant-numeric:tabular-nums}
/* race timeline — mini pills (others, below hero) */
.race-line{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap}
.rl-item{flex:1;min-width:220px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:14px}
.rl-item.a{background:linear-gradient(135deg,#fff,#fff8f3);border-color:#f0b9a8}
.rl-l{flex:1;min-width:0}
.rl-name{font-size:13px;font-weight:700;color:var(--ink);line-height:1.2;display:flex;align-items:center;gap:6px}
.rl-tag{font-size:8px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--red);background:#fdece9;padding:2px 6px;border-radius:16px}
.rl-meta{font-size:11px;color:var(--muted);margin-top:3px}
.rl-cd{text-align:right;line-height:1;font-variant-numeric:tabular-nums}
.rl-cd-n{font-size:20px;font-weight:800;color:var(--ink)}

function isDone(wi,di){return !!done['w'+wi+'d'+di]}
function wkDone(wi){return W[wi].d.filter(x=>x.t!=='rest'&&isDone(wi,x.d)).length}
function wkTotal(wi){return W[wi].d.filter(x=>x.t!=='rest').length}

function getLog(wi,di){return log['w'+wi+'d'+di]||null}
// EF = ความเร็ว (m/min) ÷ HR เฉลี่ย — สูง=ฟิตขึ้น (เร็วขึ้น หรือ HR ต่ำลง ดันค่าขึ้นทั้งคู่)
function efOf(l){return(l&&l.km>0&&l.min>0&&l.hr>0)?(l.km*1000/l.min/l.hr):null}
// EF series in chronological order, outdoor easy runs only — ตัด tm + mixed (หลาย activity/วัน)
function efSeries(){const a=[];W.forEach((w,wi)=>w.d.forEach(day=>{if(day.t!=='easy')return;const l=getLog(wi,day.d);if(l&&(l.env==='tm'||l.mix))return;const e=efOf(l);if(e)a.push(e)}));return a}
function cumKm(){let s=0;W.forEach((w,wi)=>w.d.forEach(day=>{const l=getLog(wi,day.d);if(l&&l.km>0)s+=l.km}));return s}
function nextRace(){const now=new Date();now.setHours(0,0,0,0);let best=null;W.forEach((w,wi)=>w.d.forEach(day=>{if(day.t!=='race')return;const d=dateOf(wi,day.d);d.setHours(0,0,0,0);if(d>=now&&(!best||d<best.d))best={d:d,ti:day.ti}}));return best}

// avg HR ต่อประเภท session (ทั้งแผน) — แบบ go-sub42
function hrByType(){
 const acc={easy:[],quality:[],long:[]};
 W.forEach((w,wi)=>w.d.forEach(day=>{if(!acc[day.t])return;const l=getLog(wi,day.d);if(l&&l.hr>0)acc[day.t].push(l)}));
 const out=[];
 for(const k in acc){const a=acc[k];if(!a.length)continue;
  const avg=Math.round(a.reduce((s,l)=>s+l.hr,0)/a.length);
  const mx=a.filter(l=>l.hx>0).map(l=>l.hx);
  out.push({t:k,avg,max:mx.length?Math.round(Math.max(...mx)):0,n:a.length});
 }
 return out;
}
function renderProg(){

 // monthly mileage (เดือนปัจจุบันจริง)
 const mNow=new Date(),mIdx=mNow.getMonth(),yIdx=mNow.getFullYear();
 let mAct=0,mPlan=0;
 W.forEach((ww,wi)=>ww.d.forEach(day=>{
  const dt=dateOf(wi,day.d);
  if(dt.getMonth()===mIdx&&dt.getFullYear()===yIdx){mPlan+=day.k||0;const l=getLog(wi,day.d);if(l&&l.km>0)mAct+=l.km}
 }));
 const mPct=mPlan?Math.min(100,Math.round(mAct/mPlan*100)):0;
 const mColor=mPct>=100?'#52c896':mPct>=70?'#2faa72':mPct>=40?'#f5a623':'#e63012';
 const mStatus=mAct>=mPlan?'เกินเป้า ✓':'เหลือ '+(mPlan-mAct).toFixed(0)+' km';
 const ringR=18,ringC=2*Math.PI*ringR,ringOff=ringC*(1-mPct/100);
 const ef=efSeries();
 // km logged
 let h='<div class="prog"><div class="prog-l">ระยะสะสม</div><div class="prog-v" style="color:#2faa72">'+(km?km.toFixed(1):'0')+'</div><div class="prog-u">km บันทึกจริง</div></div>';
 // sessions
 h+='<div class="prog"><div class="prog-l">Sessions</div><div class="prog-v">'+dn+'<span style="font-size:13px;color:#706960">/'+tot+'</span></div><div class="prog-u">'+Math.round(dn/tot*100)+'% ของทั้งแผน</div></div>';
 // countdown
 // monthly mileage tile (แทน A-Race ที่ซ้ำกับ hero)
 h+='<div class="prog prog-month"><div class="prog-l">'+MONTHS[mIdx]+' '+yIdx+'</div>'+
  '<div class="prog-month-row">'+
   '<div class="prog-month-ring"><svg width="42" height="42"><circle cx="21" cy="21" r="'+ringR+'" fill="none" stroke="#f1efe9" stroke-width="4.5"/><circle cx="21" cy="21" r="'+ringR+'" fill="none" stroke="'+mColor+'" stroke-width="4.5" stroke-linecap="round" stroke-dasharray="'+ringC.toFixed(1)+'" stroke-dashoffset="'+ringOff.toFixed(1)+'" transform="rotate(-90 21 21)"/></svg><div class="prog-month-pct">'+mPct+'%</div></div>'+
   '<div class="prog-month-r"><div class="prog-v" style="font-size:18px">'+mAct.toFixed(1)+'<span style="font-size:11px;color:#706960;font-weight:600"> / '+mPlan+'</span></div>'+
    '<div class="prog-u" style="color:'+mColor+';font-weight:600">'+mStatus+'</div></div>'+
  '</div></div>';
 // aerobic efficiency · เทียบ rolling 3 ก่อนหน้า (ไม่ใช่ all-time avg = ลด outlier noise)
 let efv='–',efu='ยังไม่มีข้อมูล Easy run',efarw='';
 if(ef.length){
  const latest=ef[ef.length-1];
  efv=latest.toFixed(2);
  // band: <0.85 ต่ำ · 0.85-0.95 ดี · >0.95 มาก
  const band=latest<0.85?'ต่ำกว่าเกณฑ์':latest<0.95?'Base ติดแล้ว ✅':'สูง · ฟิตจัด';
  if(ef.length>1){
   // rolling: 3 runs ก่อน (ตัดตัว latest ออก)
   const window=ef.slice(Math.max(0,ef.length-4),ef.length-1);
   const prior=window.reduce((a,b)=>a+b,0)/window.length;
   const delta=latest-prior;
   const better=delta>0.005;       // threshold เล็กน้อย (กัน noise)
   const worse=delta<-0.005;
   efarw=better?'<span class="arw" style="color:#2faa72">▲</span>':worse?'<span class="arw" style="color:#e63012">▼</span>':'';
   const trendL=better?'ดีกว่า':worse?'ต่ำกว่า':'เท่ากับ';
   efu=band+' · '+trendL+' '+window.length+' run ก่อน ('+prior.toFixed(2)+')';
  }else{efu=band+' · baseline ≥ 0.85';}
 }
 h+='<div class="prog ef"><div class="prog-l tip">Aerobic Eff.<i class="tip-i">i</i><span class="tip-body"><b>EF (Aerobic Efficiency)</b> = pace ÷ HR · สูงขึ้น = วิ่งเร็วขึ้นที่หัวใจทำงานเท่าเดิม · <b>0.85+</b> = base aerobic ติดแล้ว</span></div><div class="prog-v" style="color:var(--blue)">'+efv+efarw+'</div><div class="prog-u">'+efu+'</div></div>';
 pb.innerHTML=h;
}

   const e=efOf(l);if(e&&t==='easy'&&l.env!=='tm'&&!l.mix)html+='<span class="lb lb-ef">EF '+e.toFixed(2)+'</span>';
   if(l.env==='tm')html+='<span class="lb lb-tm">🏠 treadmill</span>';
   html+='</div>';
   if(l.note)html+='<div class="log-note">'+l.note+'</div>';
   html+='</div></div>';
  });
  html+='</div>';
 }

 // กราฟ HR รายสัปดาห์ — line chart · 2 เส้น (avg + max) · มี filter chip
 const hrMode=window.__hrMode||'easy';   // 'easy' | 'all'
 const wk=[];W.forEach((ww,wi)=>{const hrs=[],mxs=[];ww.d.forEach(day=>{const l=getLog(wi,day.d);if(!l||!(l.hr>0))return;const t=l.type||day.t;if(hrMode==='easy'&&t!=='easy')return;if(hrMode==='all'&&!['easy','quality','long'].includes(t))return;hrs.push(l.hr);if(l.hx)mxs.push(l.hx)});if(hrs.length)wk.push({w:wi+1,hr:Math.round(hrs.reduce((s,x)=>s+x,0)/hrs.length),hx:mxs.length?Math.round(Math.max(...mxs)):0})});
 if(wk.length){
  html+='<div class="section-l">HR รายสัปดาห์</div>';
  html+='<div class="hr-tabs">'+
   '<button class="hr-tab'+(hrMode==='easy'?' active':'')+'" onclick="setHRMode(\'easy\')">Easy เท่านั้น</button>'+
   '<button class="hr-tab'+(hrMode==='all'?' active':'')+'" onclick="setHRMode(\'all\')">ทุก run</button>'+
   '</div>';
  const VW=600,VH=210,pL=32,pR=10,pT=18,pB=28,pw=VW-pL-pR,ph=VH-pT-pB,yMin=120,yMax=195;
  const ym=v=>(pT+ph*(1-(v-yMin)/(yMax-yMin)));
  const n=wk.length,slot=n>1?pw/(n-1):0,xc=i=>n>1?pL+slot*i:pL+pw/2;
  let s='<div class="hr-svg-wrap"><svg viewBox="0 0 '+VW+' '+VH+'" class="hr-svg">';
  [130,150,170,190].forEach(g=>{s+='<line x1="'+pL+'" y1="'+ym(g).toFixed(1)+'" x2="'+(VW-pR)+'" y2="'+ym(g).toFixed(1)+'" class="hr-grid"/><text x="'+(pL-5)+'" y="'+(ym(g)+3).toFixed(1)+'" class="hr-axis" text-anchor="end">'+g+'</text>'});
  // เส้น max (terracotta) — เฉพาะจุดที่มี hx
  const mxPts=wk.map((p,i)=>p.hx>0?{x:xc(i),y:ym(p.hx),v:p.hx}:null).filter(Boolean);
  if(mxPts.length>1){const mp=mxPts.map((p,i)=>(i?'L':'M')+p.x.toFixed(1)+' '+p.y.toFixed(1)).join(' ');s+='<path class="hr-line" d="'+mp+'" fill="none" stroke="#b9786a" stroke-width="2" stroke-linejoin="round"/>'}
  mxPts.forEach(p=>{s+='<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="4" fill="#b9786a"/>';s+='<text x="'+p.x.toFixed(1)+'" y="'+(p.y-10).toFixed(1)+'" class="hr-axis-bold" text-anchor="middle" style="fill:#b9786a">'+p.v+'</text>'});
  // เส้น avg (เขียว)
  const avgPts=wk.map((p,i)=>({x:xc(i),y:ym(p.hr),v:p.hr}));
  if(avgPts.length>1){const ap=avgPts.map((p,i)=>(i?'L':'M')+p.x.toFixed(1)+' '+p.y.toFixed(1)).join(' ');s+='<path class="hr-line" d="'+ap+'" fill="none" stroke="#2faa72" stroke-width="2.5" stroke-linejoin="round"/>'}
  avgPts.forEach(p=>{s+='<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="4.5" fill="#2faa72"/>';s+='<text x="'+p.x.toFixed(1)+'" y="'+(p.y+19).toFixed(1)+'" class="hr-axis-bold" text-anchor="middle" style="fill:#2faa72">'+p.v+'</text>'});
  // x-axis labels (bigger)
  wk.forEach((p,i)=>{s+='<text x="'+xc(i).toFixed(1)+'" y="'+(VH-pB+15)+'" class="hr-axis-bold" text-anchor="middle">W'+p.w+'</text>'});
  s+='</svg></div><div class="hr-leg">';
  s+='<span class="hr-lg"><span class="hr-lgd" style="background:#2faa72"></span>avg</span>';
  s+='<span class="hr-lg"><span class="hr-lgd" style="background:#b9786a"></span>max</span></div>';
  html+=s;
 }

 // 🎯 Note — journey context + Peak-End close
 // streak: longest consecutive-week run streak ending at or before current week
 let _streak=0;
 for(let wi=Math.min(cw,W.length-1); wi>=0; wi--){
  const hasRun=W[wi].d.some(day=>{const l=getLog(wi,day.d);return l&&l.km>0});
  if(hasRun)_streak++;else break;
 }
 // longest single run
 let _long={km:0,w:0};
 W.forEach((ww,wi)=>ww.d.forEach(day=>{const l=getLog(wi,day.d);if(!l)return;const sk=(l.ses&&l.ses.length)?l.ses[0]:l.km;if(sk>_long.km)_long={km:sk,w:ww.w}}));
 // baseline cadence (easy outdoor only)
 const _cads=[];
 W.forEach((ww,wi)=>ww.d.forEach(day=>{if(day.t!=='easy')return;const l=getLog(wi,day.d);if(l&&l.cad>0&&l.env!=='tm'&&!l.mix)_cads.push(l.cad)}));
 const _cadAvg=_cads.length?Math.round(_cads.reduce((a,b)=>a+b,0)/_cads.length):0;
 // phase description for lead text
 const _ph=W[cw].p;
 const _phDesc={Base:'สร้าง aerobic base',Threshold:'เพิ่ม T-pace tolerance','10K-Peak':'peak 10K speed',Recovery:'ฟื้น + adapt','M-Build':'สร้าง marathon endurance','M-Peak':'peak marathon fitness',Taper:'taper ก่อน race'}[_ph]||_ph;

 html+='<div class="section-l">🎯 Note</div>';
 html+='<div class="snap-card">';
 html+='<div class="snap-lead">ปอมกำลังเทรน <b>Sub-4</b> (วิ่งมาราธอน 42K ใน &lt; 4 ชม.) ที่ <b>ATM Bangkok</b> · ตอนนี้อยู่ <span class="phase-tag">'+_ph+'</span> ('+_phDesc+') สัปดาห์ <b>'+(cw+1)+'/30</b></div>';
 if(_streak>0)html+='<div class="snap-row"><span class="snap-l">สัปดาห์ติดต่อกัน</span><span class="snap-v">'+_streak+' weeks 🔥</span></div>';
 if(_long.km>0)html+='<div class="snap-row"><span class="snap-l">Longest run</span><span class="snap-v">'+_long.km+' <span class="snap-sub">km (W'+_long.w+')</span></span></div>';
 if(_cadAvg)html+='<div class="snap-row"><span class="snap-l">Cadence baseline</span><span class="snap-v">'+_cadAvg+' <span class="snap-sub">spm '+(_cadAvg>=170?'✅':'')+'</span></span></div>';
 html+='</div>';

 // อ้างอิง — Pace + Carb รวมใต้ section เดียว แต่คนละแถว
 // (คนละหน่วย: pace = ความเร็ว/โซน · carb = คาร์บ/วันซ้อม → ยุบเป็นตารางเดียวไม่ได้ เพราะแกนไม่ตรงกัน)
 html+='<div class="section-l">อ้างอิง</div>';
 html+='<div class="ref-sub">Pace · VDOT 40→43 <i>นาที/กม.</i></div><div class="ref-row">';
 [['E','#2f9e6a','6:35–7:00'],['M','#3a86c8','5:41'],['T','#f5a623','5:30'],['I','#e63012','5:05'],['R','#9a968a','4:50']].forEach(p=>{
  html+='<span class="ref-pill"><span class="ref-dot" style="background:'+p[1]+'"></span><b>'+p[0]+'</b> '+p[2]+'</span>';
 });
 html+='</div>';
 html+='<div class="ref-sub">Carb · 60 kg <i>กรัม/วัน · กดดูเมนูทั้งวัน</i></div><div class="ref-row">';
 [['พัก',CARB.rest,'var(--muted)','rest'],['Easy',CARB.easy,'#2f9e6a','easy'],['Quality',CARB.quality,'#e63012','quality'],['Long',CARB.long,'#3a86c8','long'],['Race',CARB.race,'#b07700','race']].forEach(c=>{
  const hm=NUTRI[c[3]];
  html+='<span class="ref-pill'+(hm?' ref-pill-menu':'')+'"'+(hm?' onclick="toggleMenu(\''+c[3]+'\')"':'')+'><span class="ref-dot" style="background:'+c[2]+'"></span><b>'+c[0]+'</b> '+c[1][0]+'–'+c[1][1]+'g'+(hm?' <span class="ref-caret">▾</span>':'')+'</span>';
 });
 html+='</div>';
 // 🍱 menu accordion + 🔋 recovery (responsive: desktop วางข้างกัน, mobile ซ้อน)
 html+='<div class="nutri-wrap">';
 html+='<div id="nutri-menus">';
 ['easy','long'].forEach(t=>{const m=NUTRI[t];
  html+='<div class="nutri-menu" id="nm-'+t+'">';
  html+='<div class="nutri-head" style="color:'+m.color+'">🍱 '+m.label+' · เมนูเต็มวัน <span class="nutri-tg">'+m.target+'</span></div>';
  if(m.note)html+='<div class="nutri-note">'+m.note+'</div>';
  html+='<table class="nutri-tbl"><tr><th>มื้อ</th><th>เมนู</th><th>carb</th><th>cal</th><th>prot</th></tr>';
  m.rows.forEach(r=>{html+='<tr><td>'+r[0]+'</td><td>'+r[1]+'</td><td>'+r[2]+'</td><td>'+r[3]+'</td><td>'+r[4]+'</td></tr>'});
  html+='<tr class="nutri-sum"><td colspan="2">รวม</td><td>'+m.sum.split(' · ')[0]+'</td><td colspan="2">'+m.sum.split(' · ').slice(1).join(' · ')+'</td></tr>';
  html+='</table><div class="nutri-ok">'+m.ok+'</div></div>';
 });
 html+='</div>';
 html+='<div class="recovery-block"><div class="recovery-title">🔋 Recovery · เพิ่งวิ่งเสร็จ <span class="nutri-tg">window 30 นาที</span></div>';
 RECOVERY.forEach(r=>{html+='<div class="recovery-row"><b>'+r[0]+'</b><span class="rc-goal">'+r[1]+'</span><span class="rc-eat">'+r[2]+'</span></div>'});
 html+='</div></div>';

 // ท่าเวทประจำสัปดาห์ — แสดงเฉพาะถ้าสัปดาห์นี้มี weights day
 const hasWeights=w.d.some(day=>day.t==='cross'&&/weight/i.test(day.ti));
 if(hasWeights){
  // RPE/intensity จาก plan title
  const wDay=w.d.find(day=>day.t==='cross'&&/weight/i.test(day.ti));
  const isLight=/light|เบา|-\d+%/i.test(wDay.ti+' '+(wDay.de||''));
  html+='<div class="section-l">ท่าเวทประจำสัปดาห์</div>';
  html+='<div class="weights-card">';
  WEIGHTS_ROUTINE.forEach(grp=>{
   html+='<div class="weights-grp"><div class="weights-grp-l">'+grp.l+'</div>';
   grp.items.forEach(it=>{html+='<div class="weights-row"><b>'+it[0]+'</b><span>'+it[1]+'</span></div>'});
   html+='</div>';
  });
  html+='<div class="weights-note">'+(isLight?'🟡 Deload week — ลด volume 30% (set น้อยลง หรือ weight เบาลง)':'RPE 7 · compound หนักก่อน → accessory + glute med → plyo ปิดท้าย')+'</div>';
  html+='</div>';
 }

 c.innerHTML=html;
 initMotion();
}

// motion layer — แต่ละ effect ผูกกับหน้าที่ (ไม่ใช่ขยับเปล่า)
function initMotion(){
 if(motionDone)return;                                            // เล่นรอบแรกรอบเดียว
 motionDone=true;
 if(matchMedia('(prefers-reduced-motion:reduce)').matches)return; // เคารพ accessibility
 const EASE='cubic-bezier(.22,1,.36,1)';
 const revealEls=[],vizJobs=[];

 // ── observer เดียว: reveal (fade-rise) + viz (callback) ──
 const io=new IntersectionObserver((ents,obs)=>{ents.forEach(en=>{
  if(!en.isIntersecting)return;
  const el=en.target;
  if(el.__viz){el.__viz();}
  else{el.style.transitionDelay=(el.dataset.d||0)+'ms';el.classList.add('in');}
  obs.unobserve(el);
 })},{threshold:.12,rootMargin:'0px 0px -8% 0px'});
 function viz(sel,fn){const el=document.querySelector(sel);if(!el)return;el.__viz=fn;vizJobs.push(fn);io.observe(el);}

 // ── Tier 2: count-up เลขนำหน้า (เก็บ suffix/span ไว้) · auto decimals · ข้ามถ้า hidden ──
 function cu(el,dur){
  if(!el||document.hidden)return;
  let tn=null;for(const n of el.childNodes){if(n.nodeType===3&&/\d/.test(n.nodeValue)){tn=n;break;}}
  if(!tn)return;
  const m=tn.nodeValue.match(/^([\d,]+(?:\.\d+)?)([\s\S]*)$/);if(!m)return;
  const dec=(m[1].split('.')[1]||'').length,suf=m[2]||'',tg=parseFloat(m[1].replace(/,/g,''))||0;
  if(tg<=0)return;const t0=performance.now();
  (function step(t){const p=Math.min(1,(t-t0)/(dur||800)),e=1-Math.pow(1-p,3);tn.nodeValue=(tg*e).toFixed(dec)+suf;if(p<1)requestAnimationFrame(step)})(t0);
 }
 // top stats (อยู่ในจอตอนโหลด) — reward เปิดมาเห็นเลขวิ่งขึ้น
 cu(document.querySelector('#progbar .prog:first-child .prog-v'));        // ระยะสะสม
 cu(document.querySelector('#progbar .prog:nth-child(2) .prog-v'));       // sessions
 cu(document.querySelector('#progbar .prog-month .prog-month-r .prog-v'));// km เดือนนี้
 cu(document.querySelector('#progbar .prog.ef .prog-v'));                 // aerobic eff
 document.querySelectorAll('#content .snap-card .snap-v').forEach(el=>cu(el)); // streak/longest/cadence

 // ── Tier 1: viz motion (set ค่าว่างทันที = ไม่ flash · คืนค่าจริงตอน scroll ถึง) ──
 // กราฟแท่ง — โตจากล่างทีละแท่ง
 const bars=[...document.querySelectorAll('#content .dist-chart .dc-bar,#content .dist-chart .dc-ghost')];
 bars.forEach(b=>{b.dataset.h=b.style.height;b.style.transition='height .7s '+EASE;b.style.height='0%';});
 if(bars.length)viz('#content .dist-chart',()=>bars.forEach((b,i)=>{b.style.transitionDelay=(i*28)+'ms';b.style.height=b.dataset.h;}));
 // วงแหวนเดือน — กวาด 0 → %
 const ring=document.querySelector('#progbar .prog-month-ring circle:last-of-type');
 if(ring){const off=ring.getAttribute('stroke-dashoffset'),full=ring.getAttribute('stroke-dasharray');
  ring.style.transition='stroke-dashoffset .9s '+EASE;ring.style.strokeDashoffset=full;
  viz('#progbar .prog-month-ring',()=>{ring.style.strokeDashoffset=off;});}
 // เส้น HR — วาดซ้าย→ขวา (draw-on)
 const lines=[...document.querySelectorAll('#content .hr-line')];
 lines.forEach(p=>{const len=p.getTotalLength();p.style.strokeDasharray=len;p.style.strokeDashoffset=len;p.style.transition='stroke-dashoffset 1.1s cubic-bezier(.33,1,.68,1)';});
 if(lines.length)viz('#content .hr-svg-wrap',()=>lines.forEach((p,i)=>{p.style.transitionDelay=(i*180)+'ms';p.style.strokeDashoffset='0';}));
 // bar 4/5 sessions — fill จาก 0
 const pf=document.querySelector('#content .progress-fill');
 if(pf){const w=pf.style.width;pf.style.transition='width .8s '+EASE;pf.style.width='0%';viz('#content .progress',()=>{pf.style.width=w;});}
 // training load bar — fill จาก 0
 const lf=document.querySelector('#content .load-bar .fill');
 if(lf){const w=lf.style.width;lf.style.transition='width .8s '+EASE;lf.style.width='0%';viz('#content .stat .load-bar',()=>{lf.style.width=w;});}

 // ── reveal targets (fade-rise · นำสายตาบนลงล่าง) ──
 ['#races .rl-item','#progbar .prog','.section-l','#content .stat','#content .day'].forEach(sel=>{
  document.querySelectorAll(sel).forEach((el,i)=>{el.classList.add('reveal');el.dataset.d=Math.min(i,7)*45;revealEls.push(el);io.observe(el)});
 });
 // failsafe — observer ไม่ทริกเกอร์ (เช่น โหลดตอน hidden) → บังคับให้ครบ ไม่ค้างว่าง
 setTimeout(()=>{revealEls.forEach(el=>el.classList.add('in'));vizJobs.forEach(fn=>fn());},1800);
}

function exportICS(){
 let lines=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Marathon Sub-4 Plan//TH','CALSCALE:GREGORIAN','METHOD:PUBLISH'];
 W.forEach((w,wi)=>w.d.forEach(day=>{
  if(day.t==='rest')return;
  const d=dateOf(wi,day.d);
  const ymd=d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0');
  const cb=CARB[day.ca]||CARB.rest;
  const desc=[day.de,day.al?'Optional: '+day.al:'','Carb: '+cb[0]+'-'+cb[1]+'g'].filter(Boolean).join('\\n');
  lines.push('BEGIN:VEVENT','UID:mp-w'+wi+'-d'+day.d+'@training','DTSTART;VALUE=DATE:'+ymd,'DTEND;VALUE=DATE:'+ymd,'SUMMARY:'+day.ti,'DESCRIPTION:'+desc,'CATEGORIES:TRAINING','STATUS:CONFIRMED','END:VEVENT');
 }));
 lines.push('END:VCALENDAR');
 const blob=new Blob([lines.join('\r\n')],{type:'text/calendar;charset=utf-8'});
 const url=URL.createObjectURL(blob);
 const a=document.createElement('a');a.href=url;a.download='Marathon-Sub4-Plan.ics';a.click();
 URL.revokeObjectURL(url);
}

render();
// auto-scroll to today's schedule row on first load
setTimeout(()=>{
 const todayRow=document.querySelector('.sched tr.today');
 if(todayRow)todayRow.scrollIntoView({behavior:'smooth',block:'center'});
},500);
// last sync timestamp (document.lastModified reflects when file was deployed)
(function(){
 const lm=document.lastModified?new Date(document.lastModified):null;
 if(!lm||isNaN(lm))return;
 const diffMin=Math.round((Date.now()-lm)/60000);
 const t=diffMin<60?diffMin+'m':diffMin<1440?Math.floor(diffMin/60)+'h':Math.floor(diffMin/1440)+'d';
 const el=document.querySelector('.hero-kpi');
 if(el){const b=document.createElement('div');b.className='hero-kpi-item';b.innerHTML='<div class="hk-v" style="font-size:16px;letter-spacing:0">'+t+'</div><div class="hk-l">sync ที่แล้ว</div>';el.appendChild(b);}
})();
</script>

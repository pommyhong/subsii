<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="32%" r="72%">
      <stop offset="0%"   stop-color="#7ddeff"/>
      <stop offset="45%"  stop-color="#3ab8f5"/>
      <stop offset="100%" stop-color="#0b7ecb"/>
    </radialGradient>

    <linearGradient id="bolt" x1="60%" y1="0%" x2="40%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cdeeff"/>
    </linearGradient>

    <filter id="glow" x="-40%" y="-25%" width="180%" height="150%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="frame">
      <rect width="100" height="100" rx="22"/>
    </clipPath>
  </defs>

  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <g clip-path="url(#frame)">
    <!-- Glow behind bolt -->
    <polygon points="58,12 38,12 45,48 27,48 61,88 55,52 71,52"
             fill="white" opacity="0.45" filter="url(#glow)"/>
    <!-- Bolt -->
    <polygon points="58,12 38,12 45,48 27,48 61,88 55,52 71,52"
             fill="url(#bolt)" opacity="0.94"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="42%" cy="32%" r="72%">
      <stop offset="0%" stop-color="#72D4FF"/>
      <stop offset="55%" stop-color="#29AAEF"/>
      <stop offset="100%" stop-color="#1480D4"/>
    </radialGradient>
    <radialGradient id="blob" cx="50%" cy="38%" r="58%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="42%"  stop-color="#D8F0FF" stop-opacity="0.96"/>
      <stop offset="75%"  stop-color="#A8DAFF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7EC8FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="eye-l" cx="40%" cy="30%" r="65%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#C8E8FF" stop-opacity="0.6"/>
    </radialGradient>
    <radialGradient id="eye-r" cx="40%" cy="30%" r="65%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#C8E8FF" stop-opacity="0.6"/>
    </radialGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="100" height="100" rx="22" ry="22" fill="url(#bg)"/>

  <!-- White glow blob rising from bottom -->
  <ellipse cx="50" cy="94" rx="60" ry="54" fill="url(#blob)"/>

  <!-- Left eye -->
  <ellipse cx="36.5" cy="57" rx="8" ry="10.5" fill="url(#eye-l)"/>

  <!-- Right eye -->
  <ellipse cx="63.5" cy="57" rx="8" ry="10.5" fill="url(#eye-r)"/>
</svg>
